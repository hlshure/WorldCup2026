// ESPN abbreviation quirks -> our codes
const ESPN_ABBR_MAP = {
  US:'USA', USMNT:'USA', SK:'KOR', BOS:'BIH', TKY:'TUR', TKR:'TUR', IRI:'IRN', SA:'KSA',
  DRC:'COD', ARS:'ARG', MOR:'MAR', NL:'NED',
};
const ALIASES = {
  USA: ['united states', 'usmnt', 'us'], CIV: ["cote d'ivoire", 'cote divoire', "côte d'ivoire", 'ivory coast'],
  COD: ['dr congo', 'congo dr', 'drc', 'democratic republic of congo'],
  BIH: ['bosnia and herzegovina', 'bosnia-herzegovina', 'bosnia & herzegovina', 'bosnia'],
  KOR: ['south korea', 'korea republic'], CZE: ['czechia', 'czech republic'],
  NED: ['netherlands', 'holland'], KSA: ['saudi arabia'],
};
function normalizeName(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9 ]/g, '').trim();
}
function matchTeamCode(searchTerm) {
  const n = normalizeName(searchTerm);
  if (!n) return null;
  for (const code of Object.keys(TEAMS)) { if (normalizeName(TEAMS[code].name) === n || normalizeName(code) === n) return code; }
  for (const [code, aliases] of Object.entries(ALIASES)) { if (aliases.some(a => normalizeName(a) === n)) return code; }
  for (const code of Object.keys(TEAMS)) { const nm = normalizeName(TEAMS[code].name); if (n.includes(nm) || nm.includes(n)) return code; }
  for (const [code, aliases] of Object.entries(ALIASES)) { if (aliases.some(a => n.includes(normalizeName(a)) || normalizeName(a).includes(n))) return code; }
  return null;
}
function resolveTeamCode(abbr, displayName) {
  if (abbr && TEAMS[abbr]) return abbr;
  if (abbr && ESPN_ABBR_MAP[abbr]) return ESPN_ABBR_MAP[abbr];
  return matchTeamCode(displayName) || matchTeamCode(abbr);
}

const todayS = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const toKey  = s => s.replace(/-/g,'');

const isLiveStatus = s => s==='live' || s==='halftime' || s==='extratime';
const isFinalStatus = s => s==='final' || s==='final-penalties' || s==='final-extratime';

function inferRound(dateStr) {
  if (!dateStr) return 'R32';
  if (dateStr <= '2026-07-03') return 'R32';
  if (dateStr <= '2026-07-07') return 'R16';
  if (dateStr <= '2026-07-11') return 'QF';
  if (dateStr <= '2026-07-16') return 'SF';

}

/* ════════════════════════════════════════════════════════════════════════
   ESPN LIVE DATA — direct scoreboard fetch, no server needed
   ════════════════════════════════════════════════════════════════════════ */
async function fetchESPN(dateKey) {
  const urls = [
    `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateKey}&limit=50`,
    `https://cdn.espn.com/core/soccer/scoreboard?xhr=1&league=fifa.world&dates=${dateKey}&limit=50`,
  ];
  let lastErr;
  for (const url of urls) {
    try {
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), 10000);
      const r = await fetch(url, { signal: controller.signal });
      clearTimeout(t);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const events = d.events || (d.content && d.content.sbData && d.content.sbData.events) || [];
      return events.map(parseESPNEvent);
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('ESPN fetch failed');
}

function parseESPNEvent(e) {
  const comp = (e.competitions || [])[0] || {};
  const cs = comp.competitors || [];
  const home = cs.find(c => c.homeAway === 'home') || cs[0] || {};
  const away = cs.find(c => c.homeAway === 'away') || cs[1] || {};
  const typeName = ((e.status && e.status.type && e.status.type.name) || '').toUpperCase();
  const detail = ((e.status && e.status.type && (e.status.type.detail || e.status.type.shortDetail)) || '').toLowerCase();
  const completed = e.status && e.status.type && e.status.type.completed;

  let status = 'scheduled';
  if (completed || typeName.includes('FINAL')) status = 'final';
  else if (typeName.includes('HALFTIME')) status = 'halftime';
  else if (typeName.includes('PROGRESS') || typeName.includes('LIVE')) status = 'live';
  if (status === 'final' && detail.includes('pen')) status = 'final-penalties';
  else if (status === 'final' && (detail.includes('a.e.t') || detail.includes('extra'))) status = 'final-extratime';

  const homeCode = resolveTeamCode(home.team && home.team.abbreviation, home.team && home.team.displayName);
  const awayCode = resolveTeamCode(away.team && away.team.abbreviation, away.team && away.team.displayName);
  const notStarted = status === 'scheduled';

  let venue = null;
  if (comp.venue && comp.venue.fullName) {
    const city = comp.venue.address ? [comp.venue.address.city, comp.venue.address.country].filter(Boolean).join(', ') : '';
    venue = { name: comp.venue.fullName, city };
  }

  return {
    homeCode, awayCode, status, venue,
    date: e.date ? e.date.slice(0,10) : null,
    clock: (e.status && e.status.displayClock) || null,
    homeScore: notStarted ? null : (parseInt(home.score, 10) || 0),
    awayScore: notStarted ? null : (parseInt(away.score, 10) || 0),
  };
}

function useLiveData() {
  const [matches, setMatches] = useState(() => {
    const m = {};
    R32_SEED.forEach(x => { m[x.id] = { ...x, round: 'R32' }; });
    R16_SEED.forEach(x => { m[x.id] = { ...x, round: 'R16' }; });
    return m;
  });
  const [checking, setChecking] = useState(false);
  const [liveEngineOk, setLiveEngineOk] = useState(true);
  const failCountRef = useRef(0);
  const timerRef = useRef(null);
  const matchesRef = useRef(matches);
  matchesRef.current = matches;
  const backfilledRef = useRef(false);

  const matchList = useMemo(() => Object.values(matches), [matches]);

  const mergeEvents = useCallback((events) => {
    setMatches(prev => {
      const next = { ...prev };
      events.forEach(ev => {
        if (!ev.homeCode || !ev.awayCode) return;
        const found = Object.values(next).find(m =>
          (m.home === ev.homeCode && m.away === ev.awayCode) || (m.home === ev.awayCode && m.away === ev.homeCode)
        );
        if (found) {
          const flip = found.home === ev.awayCode;
          next[found.id] = {
            ...found,
            status: ev.status || found.status,
            homeScore: ev.homeScore == null ? found.homeScore : (flip ? ev.awayScore : ev.homeScore),
            awayScore: ev.awayScore == null ? found.awayScore : (flip ? ev.homeScore : ev.awayScore),
            minute: ev.clock || found.minute,
            venue: found.venue || ev.venue,
            scoreKnown: ev.homeScore != null ? true : found.scoreKnown,
          };
        } else if (TEAMS[ev.homeCode] && TEAMS[ev.awayCode]) {
          // Auto-discover matchups ESPN knows about that we haven't seeded yet (R16 onward)
          const round = inferRound(ev.date);
          const newId = `espn-${ev.homeCode}-${ev.awayCode}-${ev.date || todayS()}`;
          if (!next[newId]) {
            next[newId] = {
              id: newId, round, date: ev.date, time: null, venue: ev.venue,
              home: ev.homeCode, away: ev.awayCode, status: ev.status,
              homeScore: ev.homeScore, awayScore: ev.awayScore, minute: ev.clock,
              scoreKnown: ev.homeScore != null, note: '',
            };
          }
        }
      });
      return next;
    });
  }, []);

  const refreshToday = useCallback(async () => {
    setChecking(true);
    try {
      const events = await fetchESPN(toKey(todayS()));
      mergeEvents(events);
      setLiveEngineOk(true);
      failCountRef.current = 0;
    } catch (e) {
      failCountRef.current += 1;
      if (failCountRef.current >= 3) setLiveEngineOk(false);
    }
    setChecking(false);
  }, [mergeEvents]);

  const backfillUnknownScores = useCallback(async () => {
    const dates = [...new Set(Object.values(matchesRef.current)
      .filter(m => isFinalStatus(m.status) && m.scoreKnown === false && m.date)
      .map(m => m.date))];
    for (const d of dates) {
      try { const events = await fetchESPN(toKey(d)); mergeEvents(events); } catch (e) {}
    }
  }, [mergeEvents]);

  // Tiered auto-refresh scheduler
  useEffect(() => {
    const schedule = () => {
      const list = Object.values(matchesRef.current);
      const hasLive = list.some(m => isLiveStatus(m.status));
      const today = todayS();
      const soonKickoff = list.some(m => {
        if (m.status !== 'scheduled' || !m.date || !m.time) return false;
        if (m.date !== today) return false;
        const kickoff = new Date(`${m.date} ${m.time.replace(' ET','')}`);
        const diff = kickoff - new Date();
        return diff > 0 && diff < 30 * 60000;
      });
      let interval = 15 * 60000;
      if (hasLive) interval = 60000;
      else if (soonKickoff) interval = 3 * 60000;
      clearTimeout(timerRef.current);
      timerRef.current = setTimeout(async () => { await refreshToday(); schedule(); }, interval);
    };
    schedule();
    return () => clearTimeout(timerRef.current);
  }, [refreshToday]);

  // Initial load: today + backfill any unresolved historical scores
  useEffect(() => {
    (async () => {
      await refreshToday();
      if (!backfilledRef.current) { backfilledRef.current = true; await backfillUnknownScores(); }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const manualRefresh = useCallback(async () => { await refreshToday(); }, [refreshToday]);

  return { matches: matchList, storylines: STORYLINES, checking, liveEngineOk, manualRefresh };
}

/* ════════════════════════════════════════════════════════════════════════
   SMALL UI PRIMITIVES
   ════════════════════════════════════════════════════════════════════════ */
function TeamFlag({ code, size = 28 }) {
  return <span style={{ fontSize: size, lineHeight: 1 }}>{(TEAMS[code] && TEAMS[code].flag) || '🏳️'}</span>;
}

function StatusPill({ match }) {
  const s = match.status;
  if (isLiveStatus(s)) {
    const label = s === 'halftime' ? 'HT' : s === 'extratime' ? 'ET' : `${match.minute || ''}`;
    return (
      <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 9px', borderRadius:20, background:'rgba(255,59,48,0.16)' }}>
        <span style={{ width:6, height:6, borderRadius:'50%', background:RED, display:'inline-block', animation:'livePulse 1.2s ease-in-out infinite' }}/>
        <span style={{ fontSize:12, fontWeight:700, color:RED, fontFamily:FONT_MONO }}>{label}</span>
      </span>
    );
  }
  if (isFinalStatus(s)) {
    return <span style={{ fontSize:12, fontWeight:600, color:LABEL2, letterSpacing:0.2 }}>
      {s === 'final-penalties' ? 'FT · PEN' : s === 'final-extratime' ? 'FT · AET' : 'FT'}
    </span>;
  }
  return <span style={{ fontSize:12, fontWeight:600, color:LABEL2, fontFamily:FONT_MONO }}>{match.time || 'TBD'}</span>;
}

function ScoreOrTime({ match, big=false }) {
  if (match.homeScore != null && match.awayScore != null) {
    return (
      <div style={{ display:'flex', alignItems:'center', gap:6, fontFamily:FONT_ROUND, fontWeight:700, fontSize: big?40:22, color:LABEL, fontVariantNumeric:'tabular-nums' }}>
        <span>{match.homeScore}</span><span style={{ color:LABEL3, fontWeight:400 }}>–</span><span>{match.awayScore}</span>
      </div>
    );
  }
  if (isFinalStatus(match.status)) {
    const winnerCode = match.winnerCode || (match.homeScore > match.awayScore ? match.home : match.away);
    return <div style={{ fontSize: big?15:12, fontWeight:700, color:GREEN, textAlign:'center' }}>{(TEAMS[winnerCode] && TEAMS[winnerCode].name) || '—'} W</div>;
  }
  return <div style={{ fontSize: big?17:13, fontWeight:600, color:LABEL3 }}>vs</div>;
}

/* ════════════════════════════════════════════════════════════════════════
   LIVE ACTIVITY CAPSULE — the signature element
   ════════════════════════════════════════════════════════════════════════ */
function LiveActivityCapsule({ liveMatches, onTap }) {
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (liveMatches.length <= 1) return;
    const t = setInterval(() => setIdx(i => (i + 1) % liveMatches.length), 4000);
    return () => clearInterval(t);
  }, [liveMatches.length]);

  if (liveMatches.length === 0) return null;
  const m = liveMatches[idx % liveMatches.length];
  const label = m.status === 'halftime' ? 'HT' : m.status === 'extratime' ? 'ET' : (m.minute || '');

  return (
    <button
      onClick={() => onTap(m)}
      style={{
        position:'fixed', top:'calc(env(safe-area-inset-top) + 6px)', left:'50%', transform:'translateX(-50%)',
        zIndex:60, display:'flex', alignItems:'center', gap:8,
        background:'rgba(20,20,22,0.92)', backdropFilter:'blur(24px) saturate(180%)', WebkitBackdropFilter:'blur(24px) saturate(180%)',
        border:'1px solid rgba(255,255,255,0.12)', borderRadius:22, padding:'7px 16px 7px 12px',
        boxShadow:'0 8px 24px rgba(0,0,0,0.5)', cursor:'pointer', maxWidth:'88vw',
        animation:'capsuleIn 0.4s ' + EASE,
      }}
    >
      <span style={{ width:7, height:7, borderRadius:'50%', background:RED, flexShrink:0, animation:'livePulse 1.2s ease-in-out infinite' }}/>
      <TeamFlag code={m.home} size={16}/>
      <span style={{ fontFamily:FONT_ROUND, fontWeight:700, fontSize:14, color:LABEL, fontVariantNumeric:'tabular-nums' }}>
        {m.homeScore ?? 0}–{m.awayScore ?? 0}
      </span>
      <TeamFlag code={m.away} size={16}/>
      <span style={{ width:1, height:12, background:HAIRLINE, margin:'0 1px' }}/>
      <span style={{ fontSize:12, fontWeight:700, color:RED, fontFamily:FONT_MONO }}>{label}</span>
      {liveMatches.length > 1 && (
        <div style={{ display:'flex', gap:3, marginLeft:2 }}>
          {liveMatches.map((_,i) => (
            <span key={i} style={{ width:4, height:4, borderRadius:'50%', background: i===idx? LABEL2 : 'rgba(255,255,255,0.2)' }}/>
          ))}
        </div>
      )}
    </button>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   SEGMENTED CONTROL — iOS UISegmentedControl
   ════════════════════════════════════════════════════════════════════════ */
function SegmentedControl({ options, value, onChange }) {

/* ════════════════════════════════════════════════════════════════════════
   MATCH DETAIL SHEET — iOS bottom sheet with drag-to-dismiss
   ════════════════════════════════════════════════════════════════════════ */
function MatchSheet({ match, onClose }) {
  const [dragY, setDragY] = useState(0);
  const startYRef = useRef(null);
  const draggingRef = useRef(false);

  const onTouchStart = (e) => { startYRef.current = e.touches[0].clientY; draggingRef.current = true; };
  const onTouchMove = (e) => {
    if (!draggingRef.current) return;
    const delta = e.touches[0].clientY - startYRef.current;
    if (delta > 0) setDragY(delta);
  };
  const onTouchEnd = () => {
    draggingRef.current = false;
    if (dragY > 110) onClose(); else setDragY(0);
  };

  if (!match) return null;
  const home = TEAMS[match.home], away = TEAMS[match.away];
  const round = (ROUND_META[match.round] && ROUND_META[match.round].label) || match.round;

  return (
    <div style={{ position:'fixed', inset:0, zIndex:100 }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.55)', animation:'fadeIn 0.25s ease' }}/>
      <div
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{
          position:'absolute', bottom:0, left:0, right:0, maxHeight:'85vh', overflowY:'auto',
          background:'#1C1C1E', borderRadius:'20px 20px 0 0', paddingBottom:'calc(28px + env(safe-area-inset-bottom))',
          transform:`translateY(${dragY}px)`, transition: dragY===0 ? `transform 0.35s ${EASE}` : 'none',
          animation:'sheetUp 0.35s ' + EASE,
        }}
      >
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 4px' }}>
          <div style={{ width:36, height:5, borderRadius:3, background:'rgba(255,255,255,0.28)' }}/>
        </div>

        <div style={{ padding:'8px 20px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:BLUE, textTransform:'uppercase', letterSpacing:0.4 }}>{round}</div>
            <StatusPill match={match}/>
          </div>
          <button onClick={onClose} style={{ background:'rgba(118,118,128,0.24)', border:'none', borderRadius:'50%', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <IconX size={16} color={LABEL2}/>
          </button>
        </div>

        <div style={{ padding:'22px 20px', display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', gap:12 }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:52, lineHeight:1 }}>{home && home.flag}</div>
            <div style={{ fontSize:15, fontWeight:700, color:LABEL, marginTop:8 }}>{home && home.name}</div>
          </div>
          <ScoreOrTime match={match} big/>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:52, lineHeight:1 }}>{away && away.flag}</div>
            <div style={{ fontSize:15, fontWeight:700, color:LABEL, marginTop:8 }}>{away && away.name}</div>
          </div>
        </div>

        <div style={{ margin:'0 20px', height:1, background:HAIRLINE }}/>

        <div style={{ padding:'18px 20px', display:'flex', flexDirection:'column', gap:14 }}>
          {match.venue && (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <IconMapPin size={16} color={LABEL2}/>
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:LABEL }}>{match.venue.name}</div>
                <div style={{ fontSize:12, color:LABEL2 }}>{match.venue.city}</div>
              </div>
            </div>
          )}
          {match.date && (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <IconCalendar size={16} color={LABEL2}/>
              <div style={{ fontSize:14, fontWeight:600, color:LABEL }}>{fmtLong(match.date)}</div>
            </div>
          )}
          {match.time && !isFinalStatus(match.status) && (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <IconClock size={16} color={LABEL2}/>
              <div style={{ fontSize:14, fontWeight:600, color:LABEL }}>{match.time}</div>
            </div>
          )}
          {match.lineage && (
            <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
              <IconArrowUpCircle size={16} color={LABEL2} style={{ marginTop:1 }}/>
              <div style={{ fontSize:13, color:LABEL2, lineHeight:1.4 }}>{match.lineage}</div>
            </div>
          )}
        </div>

        {match.note && (
          <div style={{ margin:'0 20px', padding:'14px 16px', background:CARD2, borderRadius:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:LABEL2, textTransform:'uppercase', letterSpacing:0.4, marginBottom:6 }}>Recap</div>
            <div style={{ fontSize:14, color:LABEL, lineHeight:1.5 }}>{match.note}</div>
          </div>
        )}
        {!match.note && match.status === 'scheduled' && (
          <div style={{ margin:'0 20px', padding:'14px 16px', background:CARD2, borderRadius:14, display:'flex', alignItems:'center', gap:10 }}>
            <IconClock size={16} color={LABEL2}/>
            <div style={{ fontSize:13, color:LABEL2 }}>Kickoff hasn't happened yet — check back soon.</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   TODAY TAB
   ════════════════════════════════════════════════════════════════════════ */
function TodayTab({ matches, storylines, onTapMatch }) {
  const [round, setRound] = useState('R32');
  const [selectedDate, setSelectedDate] = useState(() => {
    const today = todayS();
    const r32Dates = [...new Set(R32_SEED.map(m => m.date))];
    return r32Dates.includes(today) ? today : (r32Dates.find(d => d >= today) || r32Dates[0]);
  });

  const roundMatches = useMemo(() => matches.filter(m => m.round === round).sort((a,b) => (a.date+String(a.time)).localeCompare(b.date+String(b.time))), [matches, round]);
  const dates = useMemo(() => [...new Set(roundMatches.map(m => m.date).filter(Boolean))], [roundMatches]);
  const dayMatches = useMemo(() => roundMatches.filter(m => m.date === selectedDate), [roundMatches, selectedDate]);

  useEffect(() => {
    if (dates.length > 0 && !dates.includes(selectedDate)) setSelectedDate(dates[0]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [round]);

  return (
    <div>
      <StorylinesCarousel storylines={storylines}/>

      <div style={{ padding:'0 16px', marginBottom:14 }}>
        <SegmentedControl
          value={round} onChange={setRound}
          options={ROUND_ORDER.map(r => ({ value:r, label: ROUND_META[r].short }))}
        />
      </div>

      {dates.length > 0 ? (
        <>
          <div style={{ display:'flex', gap:6, overflowX:'auto', padding:'0 16px 14px', scrollbarWidth:'none' }}>
            {dates.map(d => {
              const isToday = d === todayS();
              const isSel = d === selectedDate;
              return (
                <button key={d} onClick={() => setSelectedDate(d)} style={{
                  display:'flex', flexDirection:'column', alignItems:'center', gap:1,
                  padding:'7px 12px', borderRadius:13, border:'none', cursor:'pointer', minWidth:46, flexShrink:0,
                  background: isSel ? LABEL : isToday ? 'rgba(255,59,48,0.15)' : 'rgba(118,118,128,0.18)',
                }}>
                  <span style={{ fontSize:9.5, fontWeight:700, textTransform:'uppercase', color: isSel ? '#000' : isToday ? RED : LABEL2 }}>{fmtDay(d)}</span>
                  <span style={{ fontFamily:FONT_ROUND, fontWeight:700, fontSize:18, color: isSel ? '#000' : LABEL, lineHeight:1.1 }}>{fmtNum(d)}</span>
                </button>
              );
            })}
          </div>

          <div style={{ padding:'0 16px' }}>
            {dayMatches.length === 0 ? (
              <div style={{ textAlign:'center', padding:'40px 20px', color:LABEL2, fontSize:13 }}>No matches this day.</div>
            ) : dayMatches.map(m => <MatchRow key={m.id} match={m} onTap={onTapMatch}/>)}
          </div>
        </>
      ) : (
        <div style={{ margin:'0 16px', padding:'32px 20px', background:CARD, border:`1px solid ${HAIRLINE}`, borderRadius:16, textAlign:'center' }}>
          <IconTrophy size={26} color={LABEL3} style={{ marginBottom:10 }}/>
          <div style={{ fontSize:14, fontWeight:600, color:LABEL, marginBottom:4 }}>{ROUND_META[round].label} · {ROUND_META[round].dateRange}</div>
          <div style={{ fontSize:12.5, color:LABEL2 }}>
            {round === 'R16' ? 'Matchups confirmed as the Round of 32 wraps up.' : 'Matchups will be set once earlier rounds conclude.'}
          </div>
          {ROUND_META[round].venue && (
            <div style={{ fontSize:12, color:LABEL2, marginTop:6 }}>{ROUND_META[round].venue.name}, {ROUND_META[round].venue.city}</div>
          )}
        </div>
      )}
    </div>
  );
}

   TAB BAR
   ════════════════════════════════════════════════════════════════════════ */
const TABS = [
  { id:'today', label:'Today', Icon: IconCalendar },
  { id:'bracket', label:'Bracket', Icon: IconTrophy },
];

function TabBar({ active, onChange, liveCount }) {
  return (
    <div style={{
      display:'flex', background:'rgba(20,20,22,0.86)', backdropFilter:'blur(24px) saturate(180%)', WebkitBackdropFilter:'blur(24px) saturate(180%)',
      borderTop:`1px solid ${HAIRLINE}`, paddingBottom:'env(safe-area-inset-bottom)', flexShrink:0,
    }}>
      {TABS.map(t => {
        const isActive = active === t.id;
        return (
          <button key={t.id} onClick={() => onChange(t.id)} style={{
            flex:1, background:'none', border:'none', cursor:'pointer', padding:'8px 0 6px',
            display:'flex', flexDirection:'column', alignItems:'center', gap:2, position:'relative',
          }}>
            <t.Icon size={23} color={isActive ? BLUE : LABEL2} strokeWidth={isActive ? 2.3 : 1.8}/>
            {t.id === 'today' && liveCount > 0 && (
              <span style={{ position:'absolute', top:5, right:'calc(50% - 16px)', width:8, height:8, borderRadius:'50%', background:RED, border:'1.5px solid #000' }}/>
            )}
            <span style={{ fontSize:10.5, fontWeight:600, color: isActive ? BLUE : LABEL2 }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   ROOT APP
   ════════════════════════════════════════════════════════════════════════ */
function App() {
  const { matches, storylines, checking, liveEngineOk, manualRefresh } = useLiveData();
  const [tab, setTab] = useState('today');
  const [sheetMatch, setSheetMatch] = useState(null);
  const [scrollY, setScrollY] = useState(0);
  const [pullDist, setPullDist] = useState(0);
  const scrollRef = useRef(null);
  const pullStartY = useRef(null);
  const pulling = useRef(false);

  const liveMatches = useMemo(() => matches.filter(m => isLiveStatus(m.status)), [matches]);

  const handleScroll = (e) => setScrollY(e.target.scrollTop);

  const onTouchStart = (e) => {
    if (scrollRef.current && scrollRef.current.scrollTop <= 0) {
      pullStartY.current = e.touches[0].clientY; pulling.current = true;
    }
  };
  const onTouchMove = (e) => {
    if (!pulling.current) return;
    const delta = e.touches[0].clientY - pullStartY.current;
    if (delta > 0) setPullDist(Math.min(delta * 0.5, 70));
  };
  const onTouchEnd = async () => {
    if (pulling.current && pullDist > 45) { await manualRefresh(); }
    pulling.current = false;
    setPullDist(0);
  };

  return (
    <div style={{ height:'100dvh', background:BG, display:'flex', flexDirection:'column', fontFamily:FONT_UI, overflow:'hidden' }}>
      <LiveActivityCapsule liveMatches={liveMatches} onTap={setSheetMatch}/>

      <LargeTitleHeader
        title={tab === 'today' ? 'World Cup 26' : 'Bracket'}
        scrollY={scrollY}
        onRefresh={manualRefresh}
        checking={checking}
      />

      <div
        ref={scrollRef}
        onScroll={handleScroll}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{ flex:1, overflowY:'auto', position:'relative' }}
      >
        {pullDist > 0 && (
          <div style={{ display:'flex', justifyContent:'center', height:pullDist, alignItems:'center', overflow:'hidden' }}>
            <IconRefresh size={18} color={LABEL2} style={{ transform:`rotate(${pullDist*4}deg)`, opacity: Math.min(pullDist/45,1) }}/>
          </div>
        )}

        {!liveEngineOk && (
          <div style={{ margin:'8px 16px', padding:'10px 14px', background:'rgba(255,59,48,0.1)', border:'1px solid rgba(255,59,48,0.25)', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
            <span style={{ fontSize:12, color:'#FF6961' }}>Live updates paused</span>
            <button onClick={manualRefresh} style={{ background:RED, border:'none', borderRadius:8, padding:'5px 11px', fontSize:11, fontWeight:700, color:'#fff', cursor:'pointer' }}>Retry</button>
          </div>
        )}

        {tab === 'today' && <TodayTab matches={matches} storylines={storylines} onTapMatch={setSheetMatch}/>}
        {tab === 'bracket' && <BracketTab matches={matches} onTapMatch={setSheetMatch}/>}

        <div style={{ height:24 }}/>
      </div>

      <TabBar active={tab} onChange={setTab} liveCount={liveMatches.length}/>

      {sheetMatch && <MatchSheet match={matches.find(m => m.id === sheetMatch.id) || sheetMatch} onClose={() => setSheetMatch(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
